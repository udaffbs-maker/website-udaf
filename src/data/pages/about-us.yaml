facultyMessages:
  title: Faculty Messages
  messages:
    - name: Dr. Maksudur Rahman Sarker
      role: Chairman
      department: Department Of Accounting
      image: /images/Maksudur-Rahman-Sir.jpeg
      message: |
        It is a great pleasure and honor for me to address University of Dhaka Accounting Forum (UDAF), a group of bright minds working toward the betterment of the students of this department. To me, UDAF is like an extra pair of hands for the department. Since its formation, UDAF has played a very courageous role in managing the departmental programs, events, and arrangements. As the chairman of this esteemed department, I am greatly honored to have UDAF at the forefront of excellence and ingenuity. 
        UDAF plays a significant role in shaping the students of our department for a competitive future. It has organized many events, like business case competitions, speaking competitions, and numerous insightful sessions, which have contributed to ensuring a bright future for the students. 
        UDAF also proudly bears the responsibility to arrange all departmental programs like Fresher's Reception, Iftar Mahfil, Accounting Day, Accounting Week, sports tournaments, and so on. The noteworthy programs like 'UDAF SAYS HI', 'Mindlogue', 'Prodigies', 'Badminton PRO' etc. do not only contribute to shaping the co-curricular activities of this department but also to building the image of our beloved department in a broader context. 
        To our current students, I encourage you to take full advantage of the resources and opportunities available to you at UDAF. UDAF is the melting melody of the creams of FBS. The meritorious faces of the department combine their talents and ideas here to do something new. Besides, it is a bridge between the current students, teachers, and alumni. I, as the Chairman of the Department of Accounting and Information Systems, wish a very bright future for UDAF. My strong appeal would be that UDAF shall maintain and nourish the social competitive environment and not try to gain personal benefit at social cost. Your journey here will shape your future. We are here to support and guide you every step of the way. Together, let us continue to strive for excellence. 
    - name: Amirus Salat
      role: Professor
      department: Department of Accounting
      image: /images/Salat-Sir-768x768.jpeg
      message: |-
        I firmly believe that a good club can have a significant impact on a student's life. The University of Dhaka Accounting Forum (UDAF) has played a great role in making me believe it. UDAF was formed in 2013 and officially registered in 2016 with the goal of providing the students of the Department of Accounting and Information Systems with the opportunity to expand their network inside the department and make them eligible for their professional lives by giving them crucial career insights and developing their skills. 
        Since its inception, UDAF has been working for the welfare of the department as well as for the students. It has organized multiple events, sessions, and seminars on various topics that have enhanced the knowledge and expertise of the students. These play a huge role in their career growth and allow them to flourish in their desired job fields. 
        UDAF is led by the brilliant and intelligent students of the Department of Accounting and Information Systems. The eight distinct wings comprehended by the club provide space for the executives to showcase and polish their creativity and managerial skills. 
        It is my utmost pleasure to be the moderator of a club like UDAF. I wish it the very best for its future, and I hope that it will always strive to lend its hand to the students as well as the department whenever it is necessary. 
