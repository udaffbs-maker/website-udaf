journey:
  title: Our Journey
  image:
    src: ~/assets/images/about-us/Journey.jpeg
    alt: Our Journey Image
  content: |
    We came across a realization that the modern corporate world is being dynamic at every moment. In order to cope up
    with this change, we believe that along with a standard CGPA it is also equally necessary to have good
    communication skills and up to date knowledge about the current business affairs while in turn secure a bright
    career. We also believe that every student of Accounting & Information Systems does have some inherent qualities
    and potentiality. Not only this we also feel that developing stronger ties with the corporate body is crucial to
    strengthen our diversity and proudly represent the AIS individuals. Upon these facts, we feel motivated to take
    the initiative to form this community, the only registered business and communication club of Faculty of Business
    Studies (FBS), University of Dhaka.We maintain a strong network & interaction among the club members. We create a
    corporate environment, formulate and practice behavior keeping pace with Corporate Code of Conduct (CCC). We build
    sustainable relationships with business personnel and entities. UDAF bridges the gap between faculty members and
    students of the department through organizing different events and seminars. We also feel the need of networking
    and experience sharing among the members and alumni and incoming members as well. We aim to become the pioneer of
    generating quality business leaders. Our activities include: workshops/seminars on case solving based
    competitions, business plan & idea writing, resume writing and interview tips, effective presentation designing
    techniques, intra university business plan competition, debate, quiz, case solving competition and sports. The
    multi-talented and extraordinary UDAF individuals never fail to stamp their distinctive competence with tremendous
    success and achievements in different spheres of the corporate world and that is what makes UDAF a good place to
    acquire skills and practice how to organize and how to be organized.
